# PROVISIONAL — validate with AWS container specialist team:
#   - eksctl Auto Mode syntax for the current eksctl release
#   - EKS Capabilities (Argo CD / ACK / KRO) enablement API — CLI commands below are the
#     expected shape; confirm exact commands/console steps at engagement time
#
# Foundation cluster definition (ADR-0004: engagement tooling, one-time, Developers never touch)
# Instantiated twice: nonprod and prod (ADR-0007). {{env}} filled at bootstrap.
apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig
metadata:
  name: platform-{{env}}
  region: {{region}}
  version: "1.33"
  tags:
    starterkit.aws/layer: foundation
    starterkit.aws/env: {{env}}
autoModeConfig:
  enabled: true    # ADR-0001: Auto Mode only — no nodeGroups, no managed node config
accessConfig:
  authenticationMode: API   # access entries; IdC group mappings applied post-create
