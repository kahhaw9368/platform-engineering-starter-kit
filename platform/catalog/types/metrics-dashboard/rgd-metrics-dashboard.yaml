# PROVISIONAL — validate with AWS container specialist team:
#   - ACK cloudwatch controller Dashboard resource availability + spec shape
#   - dashboardBody is a JSON string per CloudWatch API; widget set below is the v1 baseline
#
# ResourceGraphDefinition: MetricsDashboard (ADR-0011)
# The Platform Team's own dashboard — adoption + fleet health for ambient/leadership viewing.
# The platform measures itself with its own machinery: this is a catalog item like any other.
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: metricsdashboard.platform.starterkit.aws
spec:
  schema:
    apiVersion: v1alpha1
    kind: MetricsDashboard
    spec:
      dashboardName: string | default="platform-adoption" description="CloudWatch dashboard name"
  resources:
    - id: dashboard
      template:
        apiVersion: cloudwatch.services.k8s.aws/v1alpha1
        kind: Dashboard
        metadata:
          name: ${schema.spec.dashboardName}
          namespace: platform-system
        spec:
          dashboardName: ${schema.spec.dashboardName}
          # Baseline widgets: per-team log volume (liveness proxy), fleet alarm states,
          # ALB 5xx across services. Extended per customer at engagement time.
          dashboardBody: >-
            {"widgets":[
              {"type":"metric","x":0,"y":0,"width":12,"height":6,"properties":{
                "title":"Fleet alarms in ALARM",
                "metrics":[["AWS/CloudWatch","MetricAlarmCount"]],
                "region":"us-east-1","stat":"Maximum","period":300}},
              {"type":"log","x":12,"y":0,"width":12,"height":6,"properties":{
                "title":"Service liveness — log events by team (7d)",
                "query":"SOURCE '/platform/' | stats count(*) by @logGroup",
                "region":"us-east-1","view":"table"}}
            ]}
