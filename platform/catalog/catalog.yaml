# Machine-readable catalog index — the only output space APEX instantiates from (ADR-0003).
# Schema: schema/catalog-schema.json (enforced in CI via the render harness).
# Semver: 0.x = early adopters (ADR criteria #7).
apiVersion: starterkit.aws/v1alpha1
kind: Catalog
items:
  - name: dummy-item
    kind: kro-type
    version: 0.1.0
    description: Seam-proving fixture demonstrating the render harness end-to-end (not shown by APEX)
    path: types/dummy-item
    parameters:
      - name: widget_name
        type: string
        description: Name of the widget instance
        required: true
        pattern: "[a-z][a-z0-9-]{2,30}"
      - name: team
        type: string
        description: Owning Dev Team identifier
        required: true
        pattern: "[a-z][a-z0-9-]{1,30}"
      - name: size
        type: enum
        description: T-shirt size of the widget
        values: [small, medium, large]
        default: small
      - name: replicas
        type: integer
        description: Number of widget replicas
        default: 2

  - name: team
    kind: kro-type
    version: 0.1.0
    description: Onboard a Dev Team — namespace, quotas, RBAC, IdC group mapping, ECR repository
    path: types/team/instance
    parameters:
      - name: team_name
        type: string
        description: Dev Team identifier (kebab-case)
        required: true
        pattern: "[a-z][a-z0-9-]{1,30}"
      - name: idc_group
        type: string
        description: IAM Identity Center group name for this team's Developers
        required: true
        pattern: "[A-Za-z0-9._-]{2,64}"
      - name: cpu_quota
        type: string
        description: Namespace CPU request quota (e.g. "8")
        default: "8"
        pattern: "[0-9]+m?"
      - name: memory_quota
        type: string
        description: Namespace memory request quota (e.g. 16Gi)
        default: 16Gi
        pattern: "[0-9]+[GM]i"
      - name: pod_quota
        type: integer
        description: Maximum pods in the team namespace
        default: 50
  - name: web-service
    kind: kro-type
    version: 0.1.0
    description: Deploy a containerized web service — observability (logs, alarms) included
    path: types/web-service/instance
    parameters:
      - name: service_name
        type: string
        description: Service identifier (kebab-case)
        required: true
        pattern: "[a-z][a-z0-9-]{2,40}"
      - name: team
        type: string
        description: Owning Dev Team identifier
        required: true
        pattern: "[a-z][a-z0-9-]{1,30}"
      - name: image
        type: string
        description: Full ECR image reference with pinned tag (no :latest)
        required: true
        pattern: "[0-9]+\\.dkr\\.ecr\\.[a-z0-9-]+\\.amazonaws\\.com/[a-z0-9./_-]+:(?!latest$)[A-Za-z0-9._-]+"
      - name: port
        type: integer
        description: Container HTTP port
        default: 8080
      - name: replicas
        type: integer
        description: Desired replica count
        default: 2
      - name: size
        type: enum
        description: T-shirt size (maps to requests/limits)
        values: [small, medium, large]
        default: small
  - name: web-api
    kind: app-template
    version: 0.1.0
    description: Containerized HTTP API (FastAPI) — Dockerfile, probes, GH Actions CI implementing the artifact contract
    path: templates/web-api
    parameters:
      - name: service_name
        type: string
        description: Service identifier (kebab-case)
        required: true
        pattern: "[a-z][a-z0-9-]{2,40}"
      - name: team
        type: string
        description: Owning Dev Team identifier
        required: true
        pattern: "[a-z][a-z0-9-]{1,30}"
      - name: port
        type: integer
        description: Container HTTP port
        default: 8080
      - name: gitops_repo
        type: string
        description: GitOps repository (org/repo) that managed Argo CD watches
        required: true
        pattern: "[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+"
      - name: ci_role_arn
        type: string
        description: IAM role ARN CI assumes via OIDC to push to ECR (from Foundation bootstrap)
        required: true
        pattern: "arn:aws:iam::[0-9]{12}:role/[A-Za-z0-9+=,.@_/-]+" 
