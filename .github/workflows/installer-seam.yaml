# Installer seam (ticket T11/#12): clean-dir install -> expected layout per harness.
# Plus welcome-splash gating (ticket T13/#14): hook renders once, only for apex on startup/clear.
name: installer-seam
on:
  pull_request:
  push:
    branches: [main]
jobs:
  install-layouts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: "20"}
      - run: bash installer/tests/test_installer.sh
      - run: bash installer/tests/test_welcome_hook.sh
